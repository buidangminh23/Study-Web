<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Study Web{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', path='/css/styles.css') }}">
</head>
<body>
    <header class="topbar">
        <div class="brand-row">
            <a class="brand" href="/"><i class="fa-solid fa-graduation-cap"></i> Study Web</a>
            <a class="partner-logo" href="https://www.swinburne.edu.au/" target="_blank" rel="noopener">
                <img src="https://commons.wikimedia.org/wiki/Special:Redirect/file/Logo_of_Swinburne_University_of_Technology.svg" alt="Swinburne University of Technology">
            </a>
        </div>
        <nav class="nav">
            <a href="/subjects"><i class="fa-solid fa-book-open"></i> Courses</a>
            {% if current_user %}
                <a href="/dashboard"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
                {% if current_user.role == "admin" %}
                    <a href="/admin"><i class="fa-solid fa-screwdriver-wrench"></i> Admin</a>
                {% endif %}
                <form method="post" action="/auth/logout">
                    <button class="link-button" type="submit"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
                </form>
            {% else %}
                <a href="/auth/login"><i class="fa-solid fa-right-to-bracket"></i> Log in</a>
                <a class="button small" href="/auth/register"><i class="fa-solid fa-user-plus"></i> Sign up</a>
            {% endif %}
        </nav>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
